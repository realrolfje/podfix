base_url = "https://podcast-proxy.example.com"
output_dir = "./output"
keep_original_downloads = false
cache_artwork = false
badge_artwork = false
max_episodes = 20
podcast_mode = "auto"

[[podcasts]]
slug = "example-news"
upstream_feed_url = "https://example.com/podcast/feed.xml"

[[podcasts]]
slug = "example-story"
upstream_feed_url = "https://example.com/documentary/feed.xml"
podcast_mode = "story"
max_episodes = "unlimited"
keep_original_downloads = true

[http]
user_agent = "podcast-proxy/0.1"
timeout_seconds = 30
retries = 2

[ffmpeg]
binary = "ffmpeg"
highpass_hz = 300
lowpass_hz = 3400
compressor_threshold_db = -18
compressor_ratio = "3"
attack_ms = 20
release_ms = 250
sample_rate_hz = 22050
bitrate_kbps = 64
channels = 1
normalize = true
loudness_target_lufs = -16
true_peak_db = -1.5
loudness_range_target = 11
