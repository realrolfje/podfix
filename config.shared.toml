[http]
user_agent = "podcast-proxy/0.1"
timeout_seconds = 30
retries = 2

[ffmpeg]
binary = "/opt/homebrew/bin/ffmpeg"
highpass_hz = 300
lowpass_hz = 3400
compressor_threshold_db = -50
compressor_ratio = 10
attack_ms = 20
release_ms = 250
sample_rate_hz = 22050
bitrate_kbps = 64
channels = 2
normalize = true
loudness_target_lufs = -16
true_peak_db = -1.5
loudness_range_target = 11
